name: build

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Compiles the host-agnostic Kotlin (JVM + Wasm) — no native libs required.
  kotlin:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
      - uses: android-actions/setup-android@v4
      - run: sdkmanager "platforms;android-36" "build-tools;36.0.0"
      - uses: gradle/actions/setup-gradle@v6
      - run: ./gradlew :core:compileKotlinJvm :core:compileKotlinWasmJs :core:compileAndroidMain --stacktrace

  # Builds the desktop JNI native (whisper.cpp from source) + the JVM jar, per OS.
  desktop:
    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-latest, macos-latest, windows-latest ]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
      - uses: android-actions/setup-android@v4
      - run: sdkmanager "platforms;android-36" "build-tools;36.0.0"
      - uses: gradle/actions/setup-gradle@v6
      - run: ./gradlew :core:buildDesktopJni :core:jvmJar --stacktrace

  # Builds the Android AAR with the JNI .so (NDK + CMake) for arm64-v8a + x86_64.
  android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
      - uses: android-actions/setup-android@v4
      - run: sdkmanager "platforms;android-36" "build-tools;36.0.0" "ndk;28.2.13676358" "cmake;3.22.1"
      - uses: gradle/actions/setup-gradle@v6
      - run: ./gradlew :native:assembleRelease --stacktrace
      - uses: actions/upload-artifact@v7
        with:
          name: android-aar
          path: native/build/outputs/aar/*.aar

  # Builds the Apple static libs (Metal) and runs cinterop + iOS Kotlin compile.
  apple:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
      - uses: android-actions/setup-android@v4
      - run: sdkmanager "platforms;android-36" "build-tools;36.0.0"
      - uses: gradle/actions/setup-gradle@v6
      - name: Build whisper.cpp Apple static libs
        run: bash native/cpp/build-ios.sh
      - run: ./gradlew :core:compileKotlinIosArm64 :core:compileKotlinIosSimulatorArm64 :core:compileKotlinIosX64 --stacktrace
