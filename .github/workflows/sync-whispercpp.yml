name: Sync whisper.cpp

# There's no webhook from whisper.cpp (we don't own it), so we poll its latest
# release on a schedule. When upstream has a newer release than the pinned
# submodule, bump the submodule, push, and open a DRAFT release tagged with that
# version. Pushing alone doesn't trigger Build (GITHUB_TOKEN pushes don't), so we
# dispatch it explicitly to verify the new whisper.cpp compiles on every OS; the
# draft is the human gate for shipping com.kmpile:whisper-cpp-kmp:<version>.
#
# whisper.cpp tags frequently; this polls daily and only acts when the latest
# release differs from the pinned submodule. Adjust the cron, or run manually
# via "Run workflow".
on:
  schedule:
    - cron: "0 0 * * *" # daily 00:00 UTC
  workflow_dispatch:

permissions:
  contents: write
  actions: write # to dispatch Build on the bump (GITHUB_TOKEN pushes don't auto-trigger it)

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
          fetch-depth: 0
      - name: Resolve current vs latest whisper.cpp
        id: v
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          latest=$(gh api repos/ggml-org/whisper.cpp/releases/latest --jq .tag_name)
          current=$(git -C native/cpp/whisper.cpp describe --tags)
          echo "current=$current latest=$latest"
          echo "latest=$latest" >> "$GITHUB_OUTPUT"
          if [ -n "$latest" ] && [ "$latest" != "$current" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Bump submodule + open draft release
        if: steps.v.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          LATEST: ${{ steps.v.outputs.latest }}
        run: |
          git -C native/cpp/whisper.cpp fetch --depth 1 origin tag "$LATEST"
          git -C native/cpp/whisper.cpp checkout "$LATEST"
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add native/cpp/whisper.cpp
          git commit -m "Bump whisper.cpp -> $LATEST"
          git push
          gh workflow run build.yml --ref master
          gh release create "$LATEST" --draft --target master \
            --title "whisper-cpp-kmp $LATEST" \
            --notes "Auto-bumped to [whisper.cpp $LATEST](https://github.com/ggml-org/whisper.cpp/releases/tag/$LATEST). Wait for the **build** run to pass, then publish this release to ship \`com.kmpile:whisper-cpp-kmp:$LATEST\`."
