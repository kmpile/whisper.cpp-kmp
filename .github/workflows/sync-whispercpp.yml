name: Sync whisper.cpp

# There's no webhook from whisper.cpp (we don't own it), so we poll its latest
# release on a schedule. When upstream has a newer release than the pinned
# submodule, bump the submodule and push. Publish (snapshot to Maven Central,
# which compiles every target) is dispatched explicitly — GITHUB_TOKEN pushes
# don't trigger `push` workflows.
#
# whisper.cpp tags frequently; this polls daily and only acts when the latest
# release differs from the pinned submodule. Adjust the cron, or run manually
# via "Run workflow".
on:
  schedule:
    - cron: "0 0 * * *" # daily 00:00 UTC
  workflow_dispatch:

permissions:
  contents: write
  actions: write # to dispatch Publish on the bump

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
          fetch-depth: 0
      - name: Resolve current vs latest whisper.cpp
        id: v
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          latest=$(gh api repos/ggml-org/whisper.cpp/releases/latest --jq .tag_name)
          current=$(git -C native/cpp/whisper.cpp describe --tags)
          echo "current=$current latest=$latest"
          echo "latest=$latest" >> "$GITHUB_OUTPUT"
          if [ -n "$latest" ] && [ "$latest" != "$current" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Bump submodule, dispatch Publish
        if: steps.v.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          LATEST: ${{ steps.v.outputs.latest }}
        run: |
          git -C native/cpp/whisper.cpp fetch --depth 1 origin tag "$LATEST"
          git -C native/cpp/whisper.cpp checkout "$LATEST"
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add native/cpp/whisper.cpp
          git commit -m "Bump whisper.cpp -> $LATEST"
          git push
          gh workflow run publish.yml --ref main
