#Gradle
org.gradle.jvmargs=-Xmx4096M -Dfile.encoding=UTF-8 -Dkotlin.daemon.jvm.options\="-Xmx4096M"

#Kotlin
kotlin.code.style=official
kotlin.mpp.enableCInteropCommonization=true
# Silence "Native task 'X' is disabled" for targets/tests that can't build on the
# current host (e.g. iosX64 sim tests on Apple Silicon; apple targets on Linux/Win CI).
kotlin.native.ignoreDisabledTargets=true
# Silence "Cross Compilation with Cinterop Not Supported" — the apple cinterop can't be
# processed on non-apple hosts (Linux/Windows CI); that target is just skipped there.
kotlin.suppressGradlePluginWarnings=CrossCompilationWithCinterops

#Android
android.useAndroidX=true
android.nonTransitiveRClass=true

SONATYPE_HOST=CENTRAL_PORTAL
signAllPublications=true
RELEASE_SIGNING_ENABLED=true

GROUP=com.kmpile

POM_INCEPTION_YEAR=2026
POM_URL=https://github.com/kmpile/whisper.cpp-kmp

POM_LICENSE_NAME=MIT License
POM_LICENSE_URL=https://github.com/kmpile/whisper.cpp-kmp/LICENSE.md
POM_LICENSE_DIST=https://github.com/kmpile/whisper.cpp-kmp/LICENSE.md

POM_SCM_URL=https://github.com/kmpile/whisper.cpp-kmp/
